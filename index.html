<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0B0C0E" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Project Grizzly — Operator: David Devitt</title>
<style>
/* ============================================================
   PROJECT GRIZZLY — Forged. Powerful. Unbreakable.
   Steel-black industrial operating system. Committed dark world
   (Rogue / First Form aesthetic), Devitt purple + teal accents.
   ============================================================ */
:root{
  --steel:#0B0C0E;        /* ground */
  --char:#141619;         /* charcoal */
  --panel:#1B1E23;        /* raised panel */
  --panel-2:#23272E;      /* higher panel / inputs */
  --line:#2C313A;         /* hairlines */
  --line-soft:#22262d;
  --ink:#F4F6F8;          /* primary text */
  --ink-2:#AEB6C0;        /* secondary */
  --mute:#6E7783;         /* muted / labels */
  --purple:#8B5CF6;       /* grizzly purple (identity) */
  --purple-dim:#6D45D6;
  --teal:#2DD4BF;         /* teal (data / positive) */
  --teal-dim:#159e8d;
  --good:#3FB950;         /* back-safe green */
  --warn:#E3A008;         /* caution amber */
  --bad:#F0553B;          /* avoid red */
  --shadow:0 1px 0 rgba(255,255,255,.03), 0 14px 34px -18px rgba(0,0,0,.9);
  --r:14px; --r-sm:10px;
  --disp:"Helvetica Neue Condensed","Arial Narrow",Impact,"Helvetica Neue",Arial,sans-serif;
  --sans:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Arial,sans-serif;
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-t:env(safe-area-inset-top,0px);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:
    radial-gradient(1200px 620px at 50% -12%, #191c22 0%, rgba(25,28,34,0) 60%),
    var(--steel);
  color:var(--ink);
  font-family:var(--sans);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  line-height:1.5;
  overscroll-behavior-y:none;
  padding-bottom:calc(78px + var(--safe-b));
}
::selection{background:rgba(139,92,246,.35)}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}
a{color:var(--teal);text-decoration:none}
h1,h2,h3,h4{margin:0}
.tnum{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}

/* ---- typographic system ---- */
.display{
  font-family:var(--disp);
  text-transform:uppercase;
  letter-spacing:.02em;
  font-weight:700;
  line-height:.92;
}
.eyebrow{
  font-family:var(--disp);
  text-transform:uppercase;
  letter-spacing:.22em;
  font-weight:700;
  font-size:11px;
  color:var(--mute);
}
.label{
  font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--mute);font-weight:700;
}

/* ---- top bar ---- */
header.top{
  position:sticky;top:0;z-index:40;
  padding:calc(10px + var(--safe-t)) 18px 12px;
  background:linear-gradient(180deg, rgba(11,12,14,.96) 55%, rgba(11,12,14,0));
  backdrop-filter:blur(8px);
  display:flex;align-items:center;gap:12px;
}
.mark{width:34px;height:34px;flex:0 0 auto;filter:drop-shadow(0 2px 6px rgba(139,92,246,.35))}
.top .titles{display:flex;flex-direction:column;line-height:1;gap:3px;min-width:0}
.top .titles .t1{font-family:var(--disp);text-transform:uppercase;font-weight:700;font-size:19px;letter-spacing:.03em}
.top .titles .t1 b{color:var(--purple)}
.top .titles .t2{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--mute);font-weight:700}
.top .op{margin-left:auto;text-align:right;line-height:1.1}
.top .op .n{font-family:var(--disp);font-size:22px;font-weight:700;color:var(--teal)}
.top .op .l{font-size:9px;letter-spacing:.18em;color:var(--mute);text-transform:uppercase;font-weight:700}

/* ---- layout ---- */
main{max-width:560px;margin:0 auto;padding:6px 16px 30px;animation:fade .32s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){main{animation:none}*{scroll-behavior:auto!important}}

.section-h{display:flex;align-items:baseline;gap:10px;margin:22px 2px 12px}
.section-h h2{font-family:var(--disp);text-transform:uppercase;font-weight:700;font-size:16px;letter-spacing:.06em}
.section-h .rule{flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent)}

.card{
  background:linear-gradient(180deg,var(--panel),#171a1e);
  border:1px solid var(--line-soft);
  border-radius:var(--r);
  box-shadow:var(--shadow);
  padding:16px;
}
.card + .card{margin-top:12px}
.grid{display:grid;gap:12px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:1fr 1fr 1fr}

/* ---- hero weight ---- */
.hero{position:relative;overflow:hidden}
.hero:before{content:"";position:absolute;inset:0;background:
  radial-gradient(520px 220px at 88% -40%, rgba(139,92,246,.20), transparent 60%),
  radial-gradient(420px 200px at 8% 130%, rgba(45,212,191,.12), transparent 60%);
  pointer-events:none}
.hero .row{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;position:relative}
.hero .big{font-family:var(--disp);font-weight:700;font-size:74px;line-height:.82;letter-spacing:-.01em}
.hero .big small{font-size:22px;color:var(--ink-2);margin-left:4px}
.hero .avg{text-align:right}
.hero .avg .v{font-family:var(--disp);font-size:34px;font-weight:700;color:var(--teal);line-height:1}
canvas.spark{width:100%;height:74px;display:block;margin-top:12px}

/* trend chip */
.trend{display:inline-flex;align-items:center;gap:5px;font-weight:700;font-size:12px;padding:3px 9px;border-radius:999px;letter-spacing:.02em}
.trend.dn{color:var(--teal);background:rgba(45,212,191,.12);border:1px solid rgba(45,212,191,.3)}
.trend.up{color:var(--warn);background:rgba(227,160,8,.1);border:1px solid rgba(227,160,8,.28)}
.trend.flat{color:var(--ink-2);background:rgba(255,255,255,.05);border:1px solid var(--line)}

/* progress bar */
.pbar{height:9px;border-radius:999px;background:var(--panel-2);overflow:hidden;border:1px solid var(--line-soft)}
.pbar > i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--purple),var(--teal))}

/* stat tiles */
.tiles{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tile{background:var(--char);border:1px solid var(--line-soft);border-radius:var(--r-sm);padding:12px 13px}
.tile .k{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--mute);font-weight:700}
.tile .v{font-family:var(--disp);font-size:28px;font-weight:700;margin-top:5px;line-height:1}
.tile .v small{font-size:13px;color:var(--ink-2)}
.tile .sub{font-size:11px;color:var(--mute);margin-top:2px}
.tile .v.teal{color:var(--teal)} .tile .v.purple{color:var(--purple)}

/* mission list / checklist */
.check{display:flex;align-items:center;gap:12px;padding:11px 4px;border-top:1px solid var(--line-soft)}
.check:first-child{border-top:0}
.check .box{
  width:26px;height:26px;flex:0 0 auto;border-radius:8px;border:1.5px solid var(--line);
  background:var(--panel-2);display:grid;place-items:center;transition:.15s;color:transparent;font-weight:900;font-size:15px
}
.check.on .box{background:linear-gradient(180deg,var(--purple),var(--purple-dim));border-color:transparent;color:#fff}
.check .tx{flex:1;min-width:0}
.check .tx .m{font-weight:600;font-size:14.5px}
.check.on .tx .m{color:var(--ink-2)}
.check .tx .d{font-size:11.5px;color:var(--mute);margin-top:1px}
.check .meta{font-size:11px;color:var(--mute);text-align:right;flex:0 0 auto}

/* buttons */
.btn{
  -webkit-appearance:none;appearance:none;border:1px solid var(--line);
  background:var(--panel-2);color:var(--ink);border-radius:11px;
  padding:12px 16px;font-weight:700;font-size:14px;letter-spacing:.02em;
  display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;
  transition:transform .06s ease, background .15s, border-color .15s;
}
.btn:active{transform:scale(.985)}
.btn.primary{background:linear-gradient(180deg,var(--purple),var(--purple-dim));border-color:transparent;color:#fff;box-shadow:0 8px 22px -12px rgba(139,92,246,.9)}
.btn.teal{background:linear-gradient(180deg,var(--teal),var(--teal-dim));border-color:transparent;color:#04231f}
.btn.ghost{background:transparent}
.btn.sm{padding:8px 12px;font-size:12.5px;width:auto;border-radius:9px}
.btn:disabled{opacity:.45}

/* inputs */
.field{display:flex;flex-direction:column;gap:6px;min-width:0}
.field > .label{margin-left:1px}
input[type=text],input[type=number],input[type=date],input[type=time],select,textarea{
  -webkit-appearance:none;appearance:none;
  background:var(--panel-2);border:1px solid var(--line);border-radius:10px;
  color:var(--ink);padding:12px 12px;font-size:16px;width:100%;transition:border-color .15s, box-shadow .15s;
}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--purple);box-shadow:0 0 0 3px rgba(139,92,246,.18)}
textarea{resize:vertical;min-height:70px;line-height:1.45}
input::placeholder,textarea::placeholder{color:#565f6b}
select{background-image:linear-gradient(45deg,transparent 50%,var(--mute) 50%),linear-gradient(135deg,var(--mute) 50%,transparent 50%);background-position:calc(100% - 18px) 20px,calc(100% - 13px) 20px;background-size:5px 5px,5px 5px;background-repeat:no-repeat;padding-right:34px}
.inline{display:flex;gap:8px;align-items:center}
.inline input{text-align:center}

/* stepper for weigh-in */
.stepper{display:flex;align-items:stretch;gap:0;border:1px solid var(--line);border-radius:14px;overflow:hidden;background:var(--panel-2)}
.stepper button{width:64px;background:var(--char);border:0;color:var(--ink);font-size:30px;font-weight:300;line-height:1}
.stepper button:active{background:var(--panel)}
.stepper input{border:0;border-radius:0;background:transparent;text-align:center;font-family:var(--disp);font-size:42px;font-weight:700;padding:14px 0}
.stepper input:focus{box-shadow:none}

/* set logger rows */
.setrow{display:grid;grid-template-columns:26px 1fr 1fr 58px 34px;gap:8px;align-items:center;margin-top:8px}
.setrow .sn{font-family:var(--disp);font-size:16px;color:var(--mute);text-align:center;font-weight:700}
.setrow input{padding:10px 6px;text-align:center;font-size:15px}
.setrow .kill{background:transparent;border:0;color:var(--mute);font-size:18px;padding:0}
.setrow .rpe{padding:10px 4px}
.exhead{display:flex;align-items:center;gap:10px}
.exhead .nm{font-weight:700;font-size:15.5px;flex:1}
.exhead .scheme{font-size:11px;color:var(--mute);font-weight:600}
.prev{font-size:11px;color:var(--mute);margin-top:3px}
.pr-flag{color:var(--teal);font-weight:800;font-size:11px;letter-spacing:.04em}

/* back-safety dot */
.dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto;display:inline-block}
.dot.g{background:var(--good);box-shadow:0 0 8px rgba(63,185,80,.5)}
.dot.y{background:var(--warn);box-shadow:0 0 8px rgba(227,160,8,.5)}
.dot.r{background:var(--bad);box-shadow:0 0 8px rgba(240,85,59,.5)}
.rat-legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--ink-2)}
.rat-legend span{display:inline-flex;align-items:center;gap:6px}

/* pills / day selector */
.days{display:flex;gap:7px;overflow-x:auto;padding:2px 0 6px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.days::-webkit-scrollbar{display:none}
.day{flex:0 0 auto;padding:9px 13px;border-radius:11px;border:1px solid var(--line);background:var(--char);text-align:center;min-width:52px}
.day .dn{font-family:var(--disp);font-size:13px;font-weight:700;letter-spacing:.05em}
.day .dl{font-size:9px;color:var(--mute);letter-spacing:.08em;text-transform:uppercase;margin-top:2px}
.day.on{background:linear-gradient(180deg,var(--purple),var(--purple-dim));border-color:transparent}
.day.on .dl{color:rgba(255,255,255,.85)}
.day.today{border-color:var(--teal)}

/* measurement grid */
.meas{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.meas .field .label{display:flex;align-items:center;gap:6px}

/* handbook */
.book h3{font-family:var(--disp);text-transform:uppercase;font-size:17px;letter-spacing:.05em;margin-bottom:8px}
.book p{color:var(--ink-2);font-size:14px;margin:0 0 10px}
.rule-item{display:flex;gap:12px;padding:12px 0;border-top:1px solid var(--line-soft)}
.rule-item:first-child{border-top:0}
.rule-item .num{font-family:var(--disp);font-size:26px;font-weight:700;color:var(--purple);line-height:1;min-width:30px}
.rule-item .b{font-weight:700;font-size:14.5px}
.rule-item .s{font-size:12.5px;color:var(--mute);margin-top:2px}
.road{display:flex;gap:12px;padding:12px 0;border-top:1px solid var(--line-soft)}
.road:first-child{border-top:0}
.road .wk{font-family:var(--disp);font-size:12px;font-weight:700;color:var(--teal);min-width:64px;padding-top:2px;letter-spacing:.03em}
.road .b{font-weight:700;font-size:14px}
.road .s{font-size:12px;color:var(--mute);margin-top:1px}
.exlib{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid var(--line-soft);font-size:13.5px}
.exlib:first-child{border-top:0}
.exlib .nm{flex:1}
.exlib .tag{font-size:10px;font-weight:700;letter-spacing:.05em;color:var(--mute)}
.aisle{margin-top:6px}
.aisle .a-h{font-family:var(--disp);font-size:13px;letter-spacing:.08em;color:var(--purple);margin:14px 0 6px;text-transform:uppercase}
.aisle .a-h:first-child{margin-top:0}
.groc{display:flex;align-items:center;gap:10px;padding:7px 0;border-top:1px solid var(--line-soft);font-size:14px}
.meal{padding:12px 0;border-top:1px solid var(--line-soft)}
.meal:first-child{border-top:0}
.meal .mh{display:flex;justify-content:space-between;align-items:baseline}
.meal .mt{font-weight:700;font-size:14.5px}
.meal .mtime{font-size:11px;color:var(--mute);font-weight:700;letter-spacing:.04em}
.meal .mi{font-size:13px;color:var(--ink-2);margin-top:4px}
.meal .mm{font-size:11px;color:var(--teal);margin-top:5px;font-weight:700;letter-spacing:.03em}

/* macro rings row */
.macros{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;text-align:center}
.macro .ring{position:relative;width:100%;aspect-ratio:1;max-width:74px;margin:0 auto}
.macro .ring canvas{width:100%;height:100%}
.macro .ring .c{position:absolute;inset:0;display:grid;place-content:center;text-align:center}
.macro .ring .c b{font-family:var(--disp);font-size:17px;font-weight:700;line-height:1}
.macro .ring .c s{font-size:9px;color:var(--mute);text-decoration:none;display:block}
.macro .nm{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--mute);font-weight:700;margin-top:6px}

/* bottom nav */
nav.dock{
  position:fixed;left:0;right:0;bottom:0;z-index:50;
  padding:8px 8px calc(8px + var(--safe-b));
  background:linear-gradient(0deg, rgba(11,12,14,.98) 60%, rgba(11,12,14,.86));
  border-top:1px solid var(--line-soft);
  backdrop-filter:blur(12px);
  display:flex;justify-content:space-between;max-width:560px;margin:0 auto;
}
nav.dock button{
  background:none;border:0;color:var(--mute);flex:1;
  display:flex;flex-direction:column;align-items:center;gap:4px;padding:4px 2px;
  font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;font-weight:700;
  transition:color .15s;position:relative;
}
nav.dock button svg{width:23px;height:23px;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
nav.dock button.on{color:var(--purple)}
nav.dock button.on svg{stroke:var(--purple)}
nav.dock button.on:after{content:"";position:absolute;top:-8px;width:22px;height:3px;border-radius:3px;background:var(--purple)}

/* toast */
#toast{position:fixed;left:50%;bottom:calc(92px + var(--safe-b));transform:translateX(-50%) translateY(20px);
  background:var(--panel-2);border:1px solid var(--line);color:var(--ink);padding:11px 18px;border-radius:12px;
  font-weight:700;font-size:13.5px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.25s;z-index:80;max-width:88vw;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{border-color:rgba(45,212,191,.5)} #toast.ok:before{content:"✓ ";color:var(--teal)}

.empty{text-align:center;color:var(--mute);padding:26px 10px;font-size:13.5px}
.hint{font-size:12px;color:var(--mute);line-height:1.5}
.divider{height:1px;background:var(--line-soft);margin:14px 0}
.badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:6px;background:rgba(139,92,246,.15);color:#c3aef7;border:1px solid rgba(139,92,246,.3)}
.rowbtn{display:flex;gap:10px;margin-top:12px}
.small{font-size:12px;color:var(--mute)}
.kvs{display:flex;flex-wrap:wrap;gap:6px 16px;margin-top:6px}
.kv{font-size:12px;color:var(--ink-2)} .kv b{color:var(--ink);font-family:var(--disp);font-size:14px}
.histrow{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-top:1px solid var(--line-soft)}
.histrow:first-child{border-top:0}
.histrow .a{font-weight:700;font-size:14px}
.histrow .b{font-size:11.5px;color:var(--mute)}
.histrow .c{text-align:right;font-family:var(--disp);font-weight:700}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>

/* ---------- math helpers ---------- */
const round1 = n => Math.round(n*10)/10;
function sortedWeightDates(){ return Object.keys(S.weights).sort(); }
function latestWeight(){ const d=sortedWeightDates(); return d.length? S.weights[d[d.length-1]] : null; }
function sevenDayAvg(){
  const d=sortedWeightDates(); if(!d.length) return null;
  const last7=d.slice(-7).map(k=>S.weights[k]);
  return round1(last7.reduce((a,b)=>a+b,0)/last7.length);
}
function prevAvg(){
  const d=sortedWeightDates(); if(d.length<8) return null;
  const win=d.slice(-14,-7).map(k=>S.weights[k]); if(!win.length) return null;
  return round1(win.reduce((a,b)=>a+b,0)/win.length);
}
function e1rm(w,r){ return r>0 && w>0 ? Math.round(w*(1+r/30)) : 0; } // Epley
function latestCheckin(){ return S.checkins.length? S.checkins[S.checkins.length-1] : null; }
function navyBF(){
  const c=latestCheckin(); if(!c) return null;
  const waist=parseFloat(c.measurements?.waistNavel), neck=parseFloat(c.measurements?.neck);
  if(!waist||!neck||waist<=neck) return null;
  const h=PROFILE.heightIn;
  const bf = 86.010*Math.log10(waist-neck) - 70.041*Math.log10(h) + 36.76;
  return round1(Math.max(4,Math.min(50,bf)));
}
function leanMass(){
  const w=latestWeight(), bf=navyBF();
  if(w==null||bf==null) return null;
  return round1(w*(1-bf/100));
}
function operationNo(){ return S.checkins.length + 1; } // current operation = next check-in

// weekly compliance (last 7 days): workouts hit vs planned, nutrition meals, steps, water
function compliance(){
  const days=[]; const now=new Date();
  for(let i=6;i>=0;i--){ const dt=new Date(now); dt.setDate(dt.getDate()-i); days.push(dt.toISOString().slice(0,10)); }
  let pts=0, max=0;
  days.forEach(iso=>{
    const dow=DOW[new Date(iso+"T00:00").getDay()];
    const planned = !(dow==="sun"); // 6 training days
    if(planned){ max+=1; if(S.workouts.some(w=>w.date===iso && w.exercises.some(e=>e.sets.some(s=>s.w||s.r)))) pts+=1; }
    const n=S.nutrition[iso];
    max+=1; if(n){ const done=Object.values(n.meals||{}).filter(Boolean).length; pts += Math.min(1, done/6); }
    max+=0.5; if(n && n.steps>=TARGETS.steps) pts+=0.5;
    max+=0.5; if(n && n.water>=TARGETS.waterGal) pts+=0.5;
  });
  return max? Math.round(pts/max*100) : 0;
}

function macroTile(name,key,val,target,unit,cssvar){
  return `<div class="macro"><div class="ring" data-mkey="${key}" data-target="${target}" data-unit="${unit}" data-color="${cssvar}">
    <canvas width="140" height="140"></canvas>
    <div class="c"><b class="tnum">${val||0}</b><s>/ ${target}${unit}</s></div></div>
    <div class="nm">${name}</div></div>`;
}
function macroValue(key){
  const n=S.nutrition[todayISO()]||{};
  if(key==="cal") return Math.round((n.protein||0)*4+(n.carbs||0)*4+(n.fat||0)*9);
  return n[key]||0;
}

function exLibrary(){
  const seen={}; const out=[];
  SPLIT.forEach(s=>s.ex.forEach(e=>{ if(!seen[e[0]] && e[1]!=="—" && !e[0].includes("Rest")){ seen[e[0]]=1; out.push(e);} }));
  const extra=[["Conventional Deadlift","axial load",R.r],["Barbell Back Squat","axial load",R.r],["Barbell Bent-Over Row","spinal flexion",R.r],["Good Mornings","spinal load",R.r],["Standing Barbell OHP (heavy)","axial load",R.y]];
  extra.forEach(e=>{ if(!seen[e[0]]){seen[e[0]]=1;out.push(e);} });
  const order={g:0,y:1,r:2};
  out.sort((a,b)=>order[a[2]]-order[b[2]]);
  return out.map(e=>`<div class="exlib"><span class="dot ${e[2]}"></span><span class="nm">${e[0]}</span><span class="tag">${e[1]}</span></div>`).join("");
}

function bindWeigh(){
  const input=document.getElementById("wval");
  document.querySelectorAll("[data-wstep]").forEach(b=>b.onclick=()=>{
    input.value = round1((parseFloat(input.value)||PROFILE.startWeight)+parseFloat(b.dataset.wstep));
  });
  document.getElementById("saveWeigh").onclick=()=>{
    const v=parseFloat(input.value);
    if(!v||v<50||v>600){ toast("Enter a valid weight"); return; }
    S.weights[todayISO()]=round1(v); save();
    toast("Weight logged — "+round1(v)+" lb",true); render();
  };
  document.querySelectorAll("[data-delweigh]").forEach(b=>b.onclick=()=>{
    delete S.weights[b.dataset.delweigh]; save(); render();
  });
}

function bindTrain(){
  document.querySelectorAll("[data-day]").forEach(b=>b.onclick=()=>{ trainDay=b.dataset.day; draft=null; render(); });
  if(trainDay==="sun"||trainDay==="thu") return;
  ensureDraft();
  // sync inputs -> draft
  document.querySelectorAll(".setrow").forEach(row=>{
    const ei=+row.dataset.ex, si=+row.dataset.set;
    row.querySelectorAll("input").forEach(inp=>{
      inp.oninput=()=>{ draft.exercises[ei].sets[si][inp.dataset.f]=inp.value; };
    });
  });
  document.querySelectorAll("[data-note]").forEach(t=>t.oninput=()=>{ draft.exercises[+t.dataset.note].note=t.value; });
  document.querySelectorAll("[data-addset]").forEach(b=>b.onclick=()=>{
    draft.exercises[+b.dataset.addset].sets.push(blankSet()); rerenderTrainBody();
  });
  document.querySelectorAll("[data-killset]").forEach(b=>b.onclick=()=>{
    const [ei,si]=b.dataset.killset.split(":").map(Number);
    if(draft.exercises[ei].sets.length>1) draft.exercises[ei].sets.splice(si,1);
    rerenderTrainBody();
  });
  const sv=document.getElementById("saveWorkout");
  if(sv) sv.onclick=saveWorkout;
}
function rerenderTrainBody(){
  // re-render only exercise cards + save button to preserve day header & scroll
  render();
}
function saveWorkout(){
  // strip empty sets, keep exercises that have at least one logged set OR a note
  const clean={...draft, exercises:draft.exercises.map(e=>({
    ...e, sets:e.sets.filter(s=>s.w!==""||s.r!=="")
  }))};
  const logged=clean.exercises.some(e=>e.sets.length||e.note);
  if(!logged){ toast("Log at least one set"); return; }
  // PR detection
  let prCount=0;
  clean.exercises.forEach(e=>{
    e.sets.forEach(s=>{
      const w=parseFloat(s.w), r=parseInt(s.r);
      if(w>0&&r>0){
        const est=e1rm(w,r), cur=S.prs[e.name];
        if(!cur || est>cur.e1rm){ S.prs[e.name]={w:round1(w),r,e1rm:est,date:todayISO()}; prCount++; }
      }
    });
  });
  const idx=S.workouts.findIndex(w=>w.id===clean.id || (w.date===clean.date&&w.key===clean.key));
  if(idx>=0) S.workouts[idx]=clean; else S.workouts.push(clean);
  save();
  toast(prCount?("Session saved · "+prCount+" new PR"+(prCount>1?"s":"")+" 🔥"):"Session saved",true);
  draft=null; render();
}

/* ============================================================
   CANVAS — weight sparkline + macro rings
   ============================================================ */
function drawSpark(){
  const cv=document.getElementById("spark"); if(!cv) return;
  const dpr=window.devicePixelRatio||1;
  const w=cv.clientWidth, h=cv.clientHeight;
  cv.width=w*dpr; cv.height=h*dpr;
  const ctx=cv.getContext("2d"); ctx.scale(dpr,dpr);
  const dates=sortedWeightDates();
  if(dates.length<2){
    ctx.fillStyle="#6E7783"; ctx.font="12px -apple-system,sans-serif"; ctx.textAlign="center";
    ctx.fillText("Log two mornings to draw your trend", w/2, h/2+4); return;
  }
  const vals=dates.slice(-30).map(d=>S.weights[d]);
  const min=Math.min(...vals), max=Math.max(...vals), pad=8;
  const range=(max-min)||1;
  const X=i=>pad + i*(w-2*pad)/(vals.length-1);
  const Y=v=>h-pad-(v-min)/range*(h-2*pad);
  // area fill
  const grad=ctx.createLinearGradient(0,0,0,h);
  grad.addColorStop(0,"rgba(139,92,246,.35)"); grad.addColorStop(1,"rgba(139,92,246,0)");
  ctx.beginPath(); ctx.moveTo(X(0),Y(vals[0]));
  vals.forEach((v,i)=>ctx.lineTo(X(i),Y(v)));
  ctx.lineTo(X(vals.length-1),h); ctx.lineTo(X(0),h); ctx.closePath();
  ctx.fillStyle=grad; ctx.fill();
  // line
  ctx.beginPath(); ctx.moveTo(X(0),Y(vals[0]));
  vals.forEach((v,i)=>ctx.lineTo(X(i),Y(v)));
  ctx.strokeStyle="#8B5CF6"; ctx.lineWidth=2.4; ctx.lineJoin="round"; ctx.stroke();
  // endpoint
  const lx=X(vals.length-1), ly=Y(vals[vals.length-1]);
  ctx.beginPath(); ctx.arc(lx,ly,4,0,7); ctx.fillStyle="#2DD4BF"; ctx.fill();
  ctx.beginPath(); ctx.arc(lx,ly,7,0,7); ctx.strokeStyle="rgba(45,212,191,.4)"; ctx.lineWidth=2; ctx.stroke();
}
function drawMacros(){
  document.querySelectorAll("[data-mkey]").forEach(ring=>{
    const cv=ring.querySelector("canvas"); if(!cv) return;
    const key=ring.dataset.mkey, target=parseFloat(ring.dataset.target)||1, unit=ring.dataset.unit||"";
    const val=macroValue(key), pct=Math.max(0,Math.min(1,val/target));
    // keep center readout in sync with live typing
    const c=ring.querySelector(".c");
    if(c){ c.querySelector("b").textContent=val||0; c.querySelector("s").textContent="/ "+target+unit; }
    const ctx=cv.getContext("2d"); const s=cv.width; ctx.clearRect(0,0,s,s);
    const cx=s/2, cy=s/2, rad=s/2-14;
    const colorVar=ring.dataset.color;
    const color=getComputedStyle(document.documentElement).getPropertyValue(colorVar).trim()||"#2DD4BF";
    ctx.lineWidth=13; ctx.lineCap="round";
    ctx.beginPath(); ctx.arc(cx,cy,rad,0,Math.PI*2); ctx.strokeStyle="#23272E"; ctx.stroke();
    if(pct>0){ ctx.beginPath(); ctx.arc(cx,cy,rad,-Math.PI/2,-Math.PI/2+pct*Math.PI*2);
      ctx.strokeStyle=color; ctx.stroke(); }
  });
}

/* ---------- boot ---------- */
if(!ROUTES.includes(route)) route="dash";
render();
window.addEventListener("resize",()=>{ if(route==="dash")drawSpark(); if(route==="fuel")drawMacros(); });
</script>
</body>
</html>
