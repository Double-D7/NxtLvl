<title>Project Grizzly — Operator: David Devitt</title>
<style>
/* ============================================================
   PROJECT GRIZZLY — Forged. Powerful. Unbreakable.
   Steel-black industrial operating system. Committed dark world
   (Rogue / First Form aesthetic), Devitt purple + teal accents.
   ============================================================ */
:root{
  --steel:#0B0C0E;        /* ground */
  --char:#141619;         /* charcoal */
  --panel:#1B1E23;        /* raised panel */
  --panel-2:#23272E;      /* higher panel / inputs */
  --line:#2C313A;         /* hairlines */
  --line-soft:#22262d;
  --ink:#F4F6F8;          /* primary text */
  --ink-2:#AEB6C0;        /* secondary */
  --mute:#6E7783;         /* muted / labels */
  --purple:#8B5CF6;       /* grizzly purple (identity) */
  --purple-dim:#6D45D6;
  --teal:#2DD4BF;         /* teal (data / positive) */
  --teal-dim:#159e8d;
  --good:#3FB950;         /* back-safe green */
  --warn:#E3A008;         /* caution amber */
  --bad:#F0553B;          /* avoid red */
  --shadow:0 1px 0 rgba(255,255,255,.03), 0 14px 34px -18px rgba(0,0,0,.9);
  --r:14px; --r-sm:10px;
  --disp:"Helvetica Neue Condensed","Arial Narrow",Impact,"Helvetica Neue",Arial,sans-serif;
  --sans:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Arial,sans-serif;
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-t:env(safe-area-inset-top,0px);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:
    radial-gradient(1200px 620px at 50% -12%, #191c22 0%, rgba(25,28,34,0) 60%),
    var(--steel);
  color:var(--ink);
  font-family:var(--sans);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  line-height:1.5;
  overscroll-behavior-y:none;
  padding-bottom:calc(78px + var(--safe-b));
}
::selection{background:rgba(139,92,246,.35)}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}
a{color:var(--teal);text-decoration:none}
h1,h2,h3,h4{margin:0}
.tnum{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}

/* ---- typographic system ---- */
.display{
  font-family:var(--disp);
  text-transform:uppercase;
  letter-spacing:.02em;
  font-weight:700;
  line-height:.92;
}
.eyebrow{
  font-family:var(--disp);
  text-transform:uppercase;
  letter-spacing:.22em;
  font-weight:700;
  font-size:11px;
  color:var(--mute);
}
.label{
  font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--mute);font-weight:700;
}

/* ---- top bar ---- */
header.top{
  position:sticky;top:0;z-index:40;
  padding:calc(10px + var(--safe-t)) 18px 12px;
  background:linear-gradient(180deg, rgba(11,12,14,.96) 55%, rgba(11,12,14,0));
  backdrop-filter:blur(8px);
  display:flex;align-items:center;gap:12px;
}
.mark{width:34px;height:34px;flex:0 0 auto;filter:drop-shadow(0 2px 6px rgba(139,92,246,.35))}
.top .titles{display:flex;flex-direction:column;line-height:1;gap:3px;min-width:0}
.top .titles .t1{font-family:var(--disp);text-transform:uppercase;font-weight:700;font-size:19px;letter-spacing:.03em}
.top .titles .t1 b{color:var(--purple)}
.top .titles .t2{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--mute);font-weight:700}
.top .op{margin-left:auto;text-align:right;line-height:1.1}
.top .op .n{font-family:var(--disp);font-size:22px;font-weight:700;color:var(--teal)}
.top .op .l{font-size:9px;letter-spacing:.18em;color:var(--mute);text-transform:uppercase;font-weight:700}

/* ---- layout ---- */
main{max-width:560px;margin:0 auto;padding:6px 16px 30px;animation:fade .32s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){main{animation:none}*{scroll-behavior:auto!important}}

.section-h{display:flex;align-items:baseline;gap:10px;margin:22px 2px 12px}
.section-h h2{font-family:var(--disp);text-transform:uppercase;font-weight:700;font-size:16px;letter-spacing:.06em}
.section-h .rule{flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent)}

.card{
  background:linear-gradient(180deg,var(--panel),#171a1e);
  border:1px solid var(--line-soft);
  border-radius:var(--r);
  box-shadow:var(--shadow);
  padding:16px;
}
.card + .card{margin-top:12px}
.grid{display:grid;gap:12px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:1fr 1fr 1fr}

/* ---- hero weight ---- */
.hero{position:relative;overflow:hidden}
.hero:before{content:"";position:absolute;inset:0;background:
  radial-gradient(520px 220px at 88% -40%, rgba(139,92,246,.20), transparent 60%),
  radial-gradient(420px 200px at 8% 130%, rgba(45,212,191,.12), transparent 60%);
  pointer-events:none}
.hero .row{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;position:relative}
.hero .big{font-family:var(--disp);font-weight:700;font-size:74px;line-height:.82;letter-spacing:-.01em}
.hero .big small{font-size:22px;color:var(--ink-2);margin-left:4px}
.hero .avg{text-align:right}
.hero .avg .v{font-family:var(--disp);font-size:34px;font-weight:700;color:var(--teal);line-height:1}
canvas.spark{width:100%;height:74px;display:block;margin-top:12px}

/* trend chip */
.trend{display:inline-flex;align-items:center;gap:5px;font-weight:700;font-size:12px;padding:3px 9px;border-radius:999px;letter-spacing:.02em}
.trend.dn{color:var(--teal);background:rgba(45,212,191,.12);border:1px solid rgba(45,212,191,.3)}
.trend.up{color:var(--warn);background:rgba(227,160,8,.1);border:1px solid rgba(227,160,8,.28)}
.trend.flat{color:var(--ink-2);background:rgba(255,255,255,.05);border:1px solid var(--line)}

/* progress bar */
.pbar{height:9px;border-radius:999px;background:var(--panel-2);overflow:hidden;border:1px solid var(--line-soft)}
.pbar > i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--purple),var(--teal))}

/* stat tiles */
.tiles{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tile{background:var(--char);border:1px solid var(--line-soft);border-radius:var(--r-sm);padding:12px 13px}
.tile .k{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--mute);font-weight:700}
.tile .v{font-family:var(--disp);font-size:28px;font-weight:700;margin-top:5px;line-height:1}
.tile .v small{font-size:13px;color:var(--ink-2)}
.tile .sub{font-size:11px;color:var(--mute);margin-top:2px}
.tile .v.teal{color:var(--teal)} .tile .v.purple{color:var(--purple)}

/* mission list / checklist */
.check{display:flex;align-items:center;gap:12px;padding:11px 4px;border-top:1px solid var(--line-soft)}
.check:first-child{border-top:0}
.check .box{
  width:26px;height:26px;flex:0 0 auto;border-radius:8px;border:1.5px solid var(--line);
  background:var(--panel-2);display:grid;place-items:center;transition:.15s;color:transparent;font-weight:900;font-size:15px
}
.check.on .box{background:linear-gradient(180deg,var(--purple),var(--purple-dim));border-color:transparent;color:#fff}
.check .tx{flex:1;min-width:0}
.check .tx .m{font-weight:600;font-size:14.5px}
.check.on .tx .m{color:var(--ink-2)}
.check .tx .d{font-size:11.5px;color:var(--mute);margin-top:1px}
.check .meta{font-size:11px;color:var(--mute);text-align:right;flex:0 0 auto}

/* buttons */
.btn{
  -webkit-appearance:none;appearance:none;border:1px solid var(--line);
  background:var(--panel-2);color:var(--ink);border-radius:11px;
  padding:12px 16px;font-weight:700;font-size:14px;letter-spacing:.02em;
  display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;

let trainDay = DOW[new Date().getDay()];
function currentWorkout(iso, key){
  return S.workouts.find(w=>w.date===iso && w.key===key);
}
function VIEW_train(){
  const iso=todayISO();
  const wk=SPLIT.find(s=>s.key===trainDay);
  let session=currentWorkout(iso,trainDay);

  const dayBtns = SPLIT.map(s=>{
    const isToday=s.key===DOW[new Date().getDay()];
    return `<button class="day ${s.key===trainDay?"on":""} ${isToday?"today":""}" data-day="${s.key}">
      <div class="dn">${s.d}</div><div class="dl">${s.title.split(" ")[0]}</div></button>`;
  }).join("");

  let body;
  if(trainDay==="sun" || trainDay==="thu"){
    body = `<div class="card">
      <div class="exhead" style="margin-bottom:10px"><span class="dot g"></span><div class="nm">${wk.title} — ${wk.sub}</div></div>
      ${wk.ex.map(e=>`<div class="exlib"><span class="dot ${e[2]}"></span><span class="nm">${e[0]}</span><span class="tag">${e[1]}</span></div>`).join("")}
      <p class="hint" style="margin:12px 0 0">${wk.cardio}. ${trainDay==="sun"?"Rest is part of the program — recover hard so you train hard.":"Nothing heroic. Move, breathe, protect the spine."}</p>
    </div>`;
  } else {
    const ex = (session? session.exercises : wk.ex.map(e=>({name:e[0],scheme:e[1],rating:e[2],sets:[blankSet()],note:""})));
    body = ex.map((e,ei)=>exerciseCard(e,ei,session)).join("") + `
      <button class="btn ${session?'':'primary'}" id="saveWorkout" style="margin-top:14px">${session?"Update session":"Save session"}</button>
      ${session?`<p class="hint" style="text-align:center;margin-top:10px">Saved ${fmtDate(session.date)} · PRs auto-detected on save</p>`:""}`;
  }

  return `
  <div class="section-h"><h2>Training</h2><span class="badge">Foundation</span><div class="rule"></div></div>
  <div class="days">${dayBtns}</div>
  <div class="card" style="margin-bottom:12px">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div><div class="display" style="font-size:22px">${wk.title}</div><div class="small">${wk.sub}</div></div>
      <div style="text-align:right"><div class="label">Cardio</div><div class="small" style="color:var(--ink-2)">${wk.cardio}</div></div>
    </div>
    <div class="rat-legend" style="margin-top:12px">
      <span><span class="dot g"></span> Spine-safe</span>
      <span><span class="dot y"></span> Brace &amp; control</span>
      <span><span class="dot r"></span> Avoid</span>
    </div>
  </div>
  ${body}
  `;
}
function blankSet(){ return {w:"",r:"",rpe:""}; }
function exerciseCard(e,ei,session){
  const pr=S.prs[e.name];
  const setsHtml=e.sets.map((s,si)=>`
    <div class="setrow" data-ex="${ei}" data-set="${si}">
      <div class="sn">${si+1}</div>
      <input type="number" inputmode="decimal" placeholder="lb" value="${s.w}" data-f="w" class="tnum"/>
      <input type="number" inputmode="numeric" placeholder="reps" value="${s.r}" data-f="r" class="tnum"/>
      <input type="number" inputmode="decimal" placeholder="RPE" value="${s.rpe}" data-f="rpe" class="tnum rpe"/>
      <button class="kill" data-killset="${ei}:${si}" aria-label="remove set">×</button>
    </div>`).join("");
  return `<div class="card" data-excard="${ei}">
    <div class="exhead">
      <span class="dot ${e.rating}" title="${RTXT[e.rating]}"></span>
      <span class="nm">${e.name}</span>
      <span class="scheme">${e.scheme}</span>
    </div>
    ${pr?`<div class="prev">PR · ${pr.w} lb × ${pr.r}  (e1RM ${pr.e1rm})</div>`:`<div class="prev">No PR logged yet</div>`}
    ${setsHtml}
    <div style="display:flex;gap:10px;margin-top:10px">
      <button class="btn sm ghost" data-addset="${ei}">+ Add set</button>
    </div>
    <textarea data-note="${ei}" placeholder="Notes — form cues, how the back felt, substitutions…" style="margin-top:10px">${e.note||""}</textarea>
  </div>`;
}

}

function macroTile(name,key,val,target,unit,cssvar){

    <p>Become a 260–270 lb, 12–15% body-fat, powerful, athletic man who can still work 12-hour days, wrestle a 280 lb show pig, coach softball, play ball with the kids — and be healthy enough to enjoy all of it. This isn't a 16-week cut. It's the next version of you.</p>
    <p style="color:var(--ink);font-weight:600">"Strong enough to protect. Healthy enough to enjoy."</p>
  </div>

  <div class="card book">
    <div class="eyebrow">Rules of Project Grizzly</div>
    <div style="margin-top:8px">
    ${RULES.map((r,i)=>`<div class="rule-item"><div class="num tnum">${i+1}</div><div><div class="b">${r[0]}</div><div class="s">${r[1]}</div></div></div>`).join("")}
    </div>
  </div>

  <div class="card book">
    <div class="eyebrow">365-Day Roadmap</div>
    <div style="margin-top:8px">
    ${ROADMAP.map(r=>`<div class="road"><div class="wk">${r[0]}</div><div><div class="b">${r[1]}</div><div class="s">${r[2]}</div></div></div>`).join("")}
    </div>
  </div>

  <div class="card book">
    <div class="eyebrow">Section 05 · Back-Safe Exercise Library</div>
    <p style="margin-top:6px">Every movement rated for a repaired L3–L5 spine. When in doubt, choose green. Toughness is protecting the back, not ignoring it.</p>
    <div class="rat-legend" style="margin:10px 0 4px">
      <span><span class="dot g"></span> ${RTXT.g}</span>
      <span><span class="dot y"></span> ${RTXT.y}</span>
      <span><span class="dot r"></span> ${RTXT.r}</span>
    </div>
    ${exLibrary()}
  </div>

  <div class="card book">
    <div class="eyebrow">Section 02 · Nutrition · Week 1</div>
    <h3 style="margin-top:6px">${TARGETS.cal} kcal · P ${TARGETS.protein} / C ${TARGETS.carbs} / F ${TARGETS.fat}</h3>
    ${MEALS.map(m=>`<div class="meal"><div class="mh"><span class="mt">${m.t}</span><span class="mtime">${m.time}</span></div>
      <div class="mi">${m.items}</div><div class="mm">${m.macro}${m.extra?" · "+m.extra:""}</div></div>`).join("")}
    <p class="hint" style="margin-top:12px">Cheat: one meal every Saturday — not a cheat day. Hydration 1½ gal/day + electrolytes. Adjust calories every two weeks off the 7-day weight trend.</p>
  </div>

  <div class="card book">
    <div class="eyebrow">Grocery List · by aisle</div>
    <div class="aisle">
    ${Object.entries(GROCERIES).map(([aisle,items])=>`
      <div class="a-h">${aisle}</div>
      ${items.map(it=>{const id=aisle+":"+it;const on=S.groceryChecked[id];return `<div class="groc" data-groc="${id}"><span class="dot ${on?'g':''}" style="${on?'':'background:var(--line);box-shadow:none'}"></span><span style="${on?'color:var(--mute);text-decoration:line-through':''}">${it}</span></div>`;}).join("")}
    `).join("")}
    </div>
  </div>

  <div class="card book">
    <div class="eyebrow">Section 08 · Baseline Benchmarks</div>
    <p style="margin-top:6px">Log working sets (not maxes) for these on week 0. They become your starting line.</p>
    ${BENCHMARKS.map(b=>{const pr=S.prs[b];return `<div class="exlib"><span class="dot g"></span><span class="nm">${b}</span><span class="tag">${pr?pr.w+" × "+pr.r:"—"}</span></div>`;}).join("")}
  </div>

  <div class="card book">
    <div class="eyebrow">Section 11 · The Grizzly Mindset</div>
    <p style="color:var(--ink);font-weight:600;font-size:15px">"Nobody cares how motivated you were. They remember what you built."</p>
    <p>Win today. Tomorrow takes care of itself. Bad workouts count — skipped workouts don't. Every week, earn one small improvement and let it compound for a year.</p>
  </div>

  <div class="card book">
    <div class="eyebrow">Your Data</div>
    <p style="margin-top:6px">Everything you log lives on this device. Export a backup or move it to a new phone anytime.</p>
    <div class="divider"></div>
    <div class="eyebrow">Install as an app</div>
    <p style="margin-top:6px">Add Project Grizzly to your home screen for a full-screen, offline app with its own icon — no browser bars.</p>
    <ul class="hint" style="margin:0 0 4px;padding-left:18px;line-height:1.7">
      <li><b>iPhone / Safari:</b> tap <b>Share</b> &rarr; <b>Add to Home Screen</b>.</li>
      <li><b>Android / Chrome:</b> use the <b>Install</b> button below (or menu &rarr; <b>Install app</b>).</li>
    </ul>
    <button class="btn primary" id="installBtn" style="display:none;margin-top:10px">Install Project Grizzly</button>
    <div class="rowbtn">
      <button class="btn ghost" id="exportData">Export backup</button>
      <button class="btn ghost" id="importData">Import</button>
    </div>
    <input type="file" id="importFile" accept="application/json" style="display:none"/>
  </div>

  <div style="text-align:center;margin:24px 0 6px" class="eyebrow">Project Grizzly · V1.0 · Year One</div>
  `;
}
function exLibrary(){
  const seen={}; const out=[];
  SPLIT.forEach(s=>s.ex.forEach(e=>{ if(!seen[e[0]] && e[1]!=="—" && !e[0].includes("Rest")){ seen[e[0]]=1; out.push(e);} }));
  const extra=[["Conventional Deadlift","axial load",R.r],["Barbell Back Squat","axial load",R.r],["Barbell Bent-Over Row","spinal flexion",R.r],["Good Mornings","spinal load",R.r],["Standing Barbell OHP (heavy)","axial load",R.y]];
  extra.forEach(e=>{ if(!seen[e[0]]){seen[e[0]]=1;out.push(e);} });
  const order={g:0,y:1,r:2};
  out.sort((a,b)=>order[a[2]]-order[b[2]]);
  return out.map(e=>`<div class="exlib"><span class="dot ${e[2]}"></span><span class="nm">${e[0]}</span><span class="tag">${e[1]}</span></div>`).join("");
}

const VIEWS={dash:VIEW_dash,weigh:VIEW_weigh,train:VIEW_train,fuel:VIEW_fuel,check:VIEW_check,book:VIEW_book};

/* ============================================================
   BINDINGS  (per-view; state saved on interaction)
   ============================================================ */
function bind(){
  // nav + any data-go
  document.querySelectorAll("[data-go]").forEach(b=>b.onclick=()=>go(b.dataset.go));

  if(route==="weigh") bindWeigh();
  if(route==="train") bindTrain();
  if(route==="fuel")  bindFuel();
  if(route==="check") bindCheck();
  if(route==="book")  bindBook();
}

function bindWeigh(){
  const input=document.getElementById("wval");
  document.querySelectorAll("[data-wstep]").forEach(b=>b.onclick=()=>{
    input.value = round1((parseFloat(input.value)||PROFILE.startWeight)+parseFloat(b.dataset.wstep));
  });
  document.getElementById("saveWeigh").onclick=()=>{
    const v=parseFloat(input.value);
    if(!v||v<50||v>600){ toast("Enter a valid weight"); return; }
    S.weights[todayISO()]=round1(v); save();
    toast("Weight logged — "+round1(v)+" lb",true); render();
  };
  document.querySelectorAll("[data-delweigh]").forEach(b=>b.onclick=()=>{
    delete S.weights[b.dataset.delweigh]; save(); render();
  });
}

function bindTrain(){
  document.querySelectorAll("[data-day]").forEach(b=>b.onclick=()=>{ trainDay=b.dataset.day; draft=null; render(); });
  if(trainDay==="sun"||trainDay==="thu") return;
  ensureDraft();
  // sync inputs -> draft
  document.querySelectorAll(".setrow").forEach(row=>{
    const ei=+row.dataset.ex, si=+row.dataset.set;
    row.querySelectorAll("input").forEach(inp=>{
      inp.oninput=()=>{ draft.exercises[ei].sets[si][inp.dataset.f]=inp.value; };
    });
  });
  document.querySelectorAll("[data-note]").forEach(t=>t.oninput=()=>{ draft.exercises[+t.dataset.note].note=t.value; });
  document.querySelectorAll("[data-addset]").forEach(b=>b.onclick=()=>{
    draft.exercises[+b.dataset.addset].sets.push(blankSet()); rerenderTrainBody();
  });
  document.querySelectorAll("[data-killset]").forEach(b=>b.onclick=()=>{
    const [ei,si]=b.dataset.killset.split(":").map(Number);
    if(draft.exercises[ei].sets.length>1) draft.exercises[ei].sets.splice(si,1);
    rerenderTrainBody();
  });
  const sv=document.getElementById("saveWorkout");
  if(sv) sv.onclick=saveWorkout;
}
function rerenderTrainBody(){
  // re-render only exercise cards + save button to preserve day header & scroll
  render();
}
function saveWorkout(){
  // strip empty sets, keep exercises that have at least one logged set OR a note
  const clean={...draft, exercises:draft.exercises.map(e=>({
    ...e, sets:e.sets.filter(s=>s.w!==""||s.r!=="")
  }))};
  const logged=clean.exercises.some(e=>e.sets.length||e.note);
  if(!logged){ toast("Log at least one set"); return; }
  // PR detection
  let prCount=0;
  clean.exercises.forEach(e=>{
    e.sets.forEach(s=>{
      const w=parseFloat(s.w), r=parseInt(s.r);
      if(w>0&&r>0){
        const est=e1rm(w,r), cur=S.prs[e.name];
        if(!cur || est>cur.e1rm){ S.prs[e.name]={w:round1(w),r,e1rm:est,date:todayISO()}; prCount++; }
      }
    });
  });
  const idx=S.workouts.findIndex(w=>w.id===clean.id || (w.date===clean.date&&w.key===clean.key));
  if(idx>=0) S.workouts[idx]=clean; else S.workouts.push(clean);
  save();
  toast(prCount?("Session saved · "+prCount+" new PR"+(prCount>1?"s":"")+" 🔥"):"Session saved",true);
  draft=null; render();
}

function bindFuel(){
  const iso=todayISO(); const n=S.nutrition[iso];
  document.querySelectorAll("[data-meal]").forEach(el=>el.onclick=()=>{
    const id=el.dataset.meal; n.meals[id]=!n.meals[id]; save(); render();
  });
  document.querySelectorAll("[data-supp]").forEach(b=>b.onclick=()=>{
    const i=b.dataset.supp; n.supps[i]=!n.supps[i]; save(); render();
  });
  document.querySelectorAll("[data-macro]").forEach(inp=>inp.oninput=()=>{
    n[inp.dataset.macro]=parseFloat(inp.value)||0; save(); drawMacros();
  });
  document.querySelectorAll("[data-hyd]").forEach(inp=>inp.oninput=()=>{
    n[inp.dataset.hyd]=parseFloat(inp.value)||0; save();
  });
}

// check-in draft
let ci={};
function bindCheck(){
  ci={measurements:{},photos:{}};
  document.querySelectorAll("[data-meas]").forEach(inp=>inp.oninput=()=>{ ci.measurements[inp.dataset.meas]=inp.value; });
  document.querySelectorAll("[data-ci]").forEach(inp=>{
    const k=inp.dataset.ci;
    if(inp.type==="range"){ ci[k]=+inp.value; }
    else ci[k]=inp.value;
    inp.oninput=()=>{ ci[k]= inp.type==="range"? +inp.value : inp.value;
      if(inp.dataset.slider){ const b=document.getElementById("sl-"+inp.dataset.slider); if(b)b.textContent=inp.value; } };
  });
  document.querySelectorAll("[data-photo]").forEach(b=>b.onclick=()=>{
    b.classList.toggle("teal"); b.classList.toggle("ghost");
    ci.photos[b.dataset.photo]=b.classList.contains("teal");
  });
  const sv=document.getElementById("saveCheckin");
  if(sv) sv.onclick=()=>{
    const rec={ id:"c"+Date.now(), date:todayISO(), operation:operationNo(),
      weight:parseFloat(ci.weight)||latestWeight(), avg:sevenDayAvg(),
      measurements:ci.measurements, bpSys:ci.bpSys, bpDia:ci.bpDia, rhr:ci.rhr, sleep:ci.sleep,
      cardio:ci.cardio, energy:ci.energy, hunger:ci.hunger, stress:ci.stress, back:ci.back,
      wins:ci.wins, focus:ci.focus, photos:ci.photos };
    S.checkins.push(rec); save();
    toast("Operation "+String(rec.operation).padStart(3,"0")+" logged — great work",true);
    go("dash");
  };
}

function bindBook(){
  document.querySelectorAll("[data-groc]").forEach(el=>el.onclick=()=>{
    const id=el.dataset.groc; S.groceryChecked[id]=!S.groceryChecked[id]; save(); render();
  });
  const ex=document.getElementById("exportData");
  if(ex) ex.onclick=()=>{
    const blob=new Blob([JSON.stringify(S,null,2)],{type:"application/json"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
    a.download="project-grizzly-backup-"+todayISO()+".json"; a.click();
    toast("Backup downloaded",true);
  };
  const imp=document.getElementById("importData"), file=document.getElementById("importFile");
  if(imp) imp.onclick=()=>file.click();
  if(file) file.onchange=e=>{
    const f=e.target.files[0]; if(!f) return;
    const rd=new FileReader();
    rd.onload=()=>{ try{ S=JSON.parse(rd.result); save(); toast("Backup restored",true); render(); }
      catch(err){ toast("Couldn't read that file"); } };
    rd.readAsText(f);
  };
  const ib=document.getElementById("installBtn");
  if(ib && window.__pgInstall){ ib.style.display="flex"; ib.onclick=async()=>{ window.__pgInstall.prompt();
    const r=await window.__pgInstall.userChoice; if(r&&r.outcome==="accepted"){ ib.style.display="none"; toast("Installing…",true);} window.__pgInstall=null; }; }
}

/* ============================================================
   CANVAS — weight sparkline + macro rings
   ============================================================ */
function drawSpark(){
  const cv=document.getElementById("spark"); if(!cv) return;
  const dpr=window.devicePixelRatio||1;
  const w=cv.clientWidth, h=cv.clientHeight;
  cv.width=w*dpr; cv.height=h*dpr;
  const ctx=cv.getContext("2d"); ctx.scale(dpr,dpr);
  const dates=sortedWeightDates();
  if(dates.length<2){
    ctx.fillStyle="#6E7783"; ctx.font="12px -apple-system,sans-serif"; ctx.textAlign="center";
    ctx.fillText("Log two mornings to draw your trend", w/2, h/2+4); return;
  }
  const vals=dates.slice(-30).map(d=>S.weights[d]);
  const min=Math.min(...vals), max=Math.max(...vals), pad=8;
  const range=(max-min)||1;
  const X=i=>pad + i*(w-2*pad)/(vals.length-1);
  const Y=v=>h-pad-(v-min)/range*(h-2*pad);
  // area fill
  const grad=ctx.createLinearGradient(0,0,0,h);
  grad.addColorStop(0,"rgba(139,92,246,.35)"); grad.addColorStop(1,"rgba(139,92,246,0)");
  ctx.beginPath(); ctx.moveTo(X(0),Y(vals[0]));
  vals.forEach((v,i)=>ctx.lineTo(X(i),Y(v)));
  ctx.lineTo(X(vals.length-1),h); ctx.lineTo(X(0),h); ctx.closePath();
  ctx.fillStyle=grad; ctx.fill();
  // line
  ctx.beginPath(); ctx.moveTo(X(0),Y(vals[0]));
  vals.forEach((v,i)=>ctx.lineTo(X(i),Y(v)));
  ctx.strokeStyle="#8B5CF6"; ctx.lineWidth=2.4; ctx.lineJoin="round"; ctx.stroke();
  // endpoint
  const lx=X(vals.length-1), ly=Y(vals[vals.length-1]);
  ctx.beginPath(); ctx.arc(lx,ly,4,0,7); ctx.fillStyle="#2DD4BF"; ctx.fill();
  ctx.beginPath(); ctx.arc(lx,ly,7,0,7); ctx.strokeStyle="rgba(45,212,191,.4)"; ctx.lineWidth=2; ctx.stroke();
}
function drawMacros(){
  document.querySelectorAll("[data-mkey]").forEach(ring=>{
    const cv=ring.querySelector("canvas"); if(!cv) return;
    const key=ring.dataset.mkey, target=parseFloat(ring.dataset.target)||1, unit=ring.dataset.unit||"";
    const val=macroValue(key), pct=Math.max(0,Math.min(1,val/target));
    // keep center readout in sync with live typing
    const c=ring.querySelector(".c");
    if(c){ c.querySelector("b").textContent=val||0; c.querySelector("s").textContent="/ "+target+unit; }
    const ctx=cv.getContext("2d"); const s=cv.width; ctx.clearRect(0,0,s,s);
    const cx=s/2, cy=s/2, rad=s/2-14;
    const colorVar=ring.dataset.color;
    const color=getComputedStyle(document.documentElement).getPropertyValue(colorVar).trim()||"#2DD4BF";
    ctx.lineWidth=13; ctx.lineCap="round";
    ctx.beginPath(); ctx.arc(cx,cy,rad,0,Math.PI*2); ctx.strokeStyle="#23272E"; ctx.stroke();
    if(pct>0){ ctx.beginPath(); ctx.arc(cx,cy,rad,-Math.PI/2,-Math.PI/2+pct*Math.PI*2);
      ctx.strokeStyle=color; ctx.stroke(); }
  });
}

/* ---------- boot ---------- */
if(!ROUTES.includes(route)) route="dash";
render();
window.addEventListener("resize",()=>{ if(route==="dash")drawSpark(); if(route==="fuel")drawMacros(); });
</script>
