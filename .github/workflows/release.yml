name: Build Windows installer

# Builds the Jarvis Windows installer (.exe) and publishes it to a GitHub
# Release you can download from the repo's "Releases" page.
#
# Triggers:
#   - push of a version tag (v0.1.0, …)  → release named after the tag
#   - push to the development branch      → release named "v0.1.0"
#   - manual run from the Actions tab
on:
  push:
    branches:
      - "claude/jarvis-voice-assistant-w93mca"
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write # needed to publish the installer to a Release

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Read app version
        id: ver
        shell: bash
        run: echo "v=v$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Compile
        run: npm run build

      - name: Run tests
        run: node test/selftest.js

      - name: Package Windows installer
        run: npx electron-builder --win --publish never
        env:
          # Code signing (optional): add repo secrets CSC_LINK (base64 .pfx) and
          # CSC_KEY_PASSWORD for a signed installer with no SmartScreen warning.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Upload installer as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-windows-installer
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml

      - name: Publish installer to a GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Use the pushed tag's name when triggered by a tag, else the version
          # from package.json (e.g. v0.1.1).
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || steps.ver.outputs.v }}
          name: Jarvis ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || steps.ver.outputs.v }}
          body: |
            Jarvis desktop assistant — Windows installer.

            **Install:** download the `.exe` below and run it. Windows SmartScreen
            may warn (unsigned build) — click **More info → Run anyway**. On first
            launch, click the ⚙ button and paste your Anthropic API key (and an
            OpenAI key for voice). No file editing required.
          files: |
            release/*.exe
            release/latest.yml
